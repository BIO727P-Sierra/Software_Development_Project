{% extends "base.html" %}
{% block title %}Login – Directed Evolution Portal{% endblock %}
{% block content %}
<div style="max-width:500px; margin:3rem auto;">
  <div class="card">
    <h2 style="margin-bottom:0.4rem;">Welcome back</h2>
    <p style="color:#6b7280; margin-bottom:1.75rem;">Log in to access your experiments.</p>
    <form method="post">
      <label for="email">Email address</label>
      <input type="email" name="email" id="email" placeholder="you@example.com" required>
      <label for="password">Password</label>
      <input type="password" name="password" id="password" placeholder="••••••••" required>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.25rem;">Log in</button>
    </form>
    <p style="margin-top:1.25rem; color:#6b7280;">
      Don't have an account? <a href="{{ url_for('auth.register') }}" style="color:#2563eb; font-weight:600;">Register</a>
    </p>
  </div>
</div>
{% endblock %}
