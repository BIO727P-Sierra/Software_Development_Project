{% extends "base.html" %}
{% block title %}UniProt Search{% endblock %}
{% block content %}
<div class="card" style="max-width:480px; margin:0 auto;">
  <h2 style="margin-bottom:1.25rem;">Search UniProt Protein</h2>
  <form method="POST">
    {{ form.csrf_token }}
    <label for="uniprot_id">{{ form.uniprot_id.label.text }}</label>
    {{ form.uniprot_id(class="", id="uniprot_id", placeholder="e.g. P00533") }}
    <button type="submit" class="btn btn-primary" style="width:100%;">{{ form.submit.label.text }}</button>
  </form>
</div>
{% endblock %}
