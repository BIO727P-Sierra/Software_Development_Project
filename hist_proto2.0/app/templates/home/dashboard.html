{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="card">
  <h1 style="margin-bottom:0.5rem;">Welcome back, {{ user.email }}!</h1>
  <p style="color:#666; margin-bottom:1.5rem;">User ID: {{ user.id }}</p>
  <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
    <a href="{{ url_for('uniprot.uniprot_search') }}" class="btn btn-primary">Start New Experiment</a>
    <a href="{{ url_for('past_experiments.list_experiments') }}" class="btn btn-secondary">View Past Experiments</a>
  </div>
</div>
{% endblock %}
