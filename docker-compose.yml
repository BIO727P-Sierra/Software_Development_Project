services:

  db:
    image: postgres:16
    restart: always
    container_name: direct_evolution_db
    environment:
      POSTGRES_DB: direct_evolution
      POSTGRES_USER: sierra
      POSTGRES_PASSWORD: sierra
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sierra -d direct_evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: direct_evolution_app
    restart: always
    ports:
      - "8080:5000"
    environment:
      DATABASE_URL: postgres://sierra:sierra@db:5432/direct_evolution
      SECRET_KEY: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads   # persist uploaded files outside the container

volumes:
  pgdata:
