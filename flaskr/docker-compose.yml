services:
  db:
    image: postgres:16
    restart: always
    container_name: direct_evolution_db

    environment:
      POSTGRES_DB: direct_evolution
      POSTGRES_USER: sierra
      POSTGRES_PASSWORD: sierra

    ports:
      - "5432:5432"

    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

